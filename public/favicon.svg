<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#070913" />
  <!-- Outer glowing circle -->
  <rect x="5" y="5" width="90" height="90" rx="15" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.4" />
  <!-- Greek Phi Letter representing golden ratio & visual syntax -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="url(#g)" stroke-width="6" />
  <line x1="50" y1="18" x2="50" y2="82" stroke="url(#g)" stroke-width="6" stroke-linecap="round" />
</svg>
